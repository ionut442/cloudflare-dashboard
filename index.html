<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flight Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #0066ff;
      --blue-light: #e8f0ff;
      --blue-hover: #0052cc;
      --text: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --bg: #f5f7fa;
      --white: #ffffff;
      --border: #e5e7eb;
      --green: #059669;
      --green-bg: #ecfdf5;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-text {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 16px;
      border: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }
    .btn-primary:hover { background: var(--blue-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--blue);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--blue-light); border-color: var(--blue); }

    /* Main */
    .main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 32px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    /* Card */
    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: fadeIn 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: #c7d7fd;
      box-shadow: 0 4px 20px rgba(0, 102, 255, 0.07);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .city-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 2px;
    }

    .country {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .iata {
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      background: var(--blue-light);
      padding: 4px 10px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 10px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
      margin-bottom: 6px;
    }

    .price {
      font-size: 23px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }

    .price.no-price {
      font-size: 18px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .currency {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .btn-send {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      transition: all 0.15s;
    }

    .btn-send:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: white;
    }

    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-send:disabled:hover { background: white; border-color: var(--border); color: var(--text); }

    .feedback {
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      display: none;
      white-space: nowrap;
    }
    .feedback.ok  { display: inline-block; background: var(--green-bg); color: var(--green); }
    .feedback.err { display: inline-block; background: var(--red-bg);   color: var(--red);   }

    /* Skeletons */
    .skeleton {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      height: 170px;
      overflow: hidden;
      position: relative;
    }

    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.03) 50%, transparent 100%);
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .skel-line {
      background: #f0f2f5;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 16px;
    }

    .sort-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .sort-select {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      padding: 8px 10px;
      min-width: 170px;
      outline: none;
    }

    .sort-select:focus {
      border-color: #b6ccff;
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
    }

    @media (max-width: 640px) {
      .header { padding: 0 16px; }
      .main { padding: 20px 16px; }
      .toolbar { justify-content: flex-start; }
      .sort-select { min-width: 100%; }
      .sort-label { width: 100%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a class="logo" href="#">
      <div class="logo-mark">✈</div>
      <span class="logo-text">FlightDash</span>
    </a>
    <div class="header-actions">
      <span class="status-text" id="statusText"></span>
      <button class="btn btn-primary" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Refresh prices
      </button>
      <a href="/output.html" class="btn btn-ghost">Output</a>
    </div>
  </header>

  <main class="main">
    <h1 class="page-title">Available destinations</h1>
    <p class="page-subtitle">Browse flight prices and send requests for any destination.</p>
    <div class="toolbar">
      <label class="sort-label" for="sortSelect">
        Sort by
        <select id="sortSelect" class="sort-select">
          <option value="city-asc">City A-Z</option>
          <option value="city-desc">City Z-A</option>
          <option value="price-asc">Price low to high</option>
          <option value="price-desc">Price high to low</option>
        </select>
      </label>
    </div>

    <div class="grid" id="skeletons">
      ${Array(6).fill(0).map(() => `
        <div class="skeleton">
          <div class="skel-line" style="width:55%;height:18px;"></div>
          <div class="skel-line" style="width:35%;height:13px;margin-bottom:18px;"></div>
          <div class="skel-line" style="width:45%;height:30px;margin-bottom:8px;"></div>
          <div class="skel-line" style="width:70%;height:13px;margin-bottom:20px;"></div>
          <div class="skel-line" style="width:100%;height:36px;border-radius:8px;margin-bottom:0;"></div>
        </div>`).join('')}
    </div>

    <div class="grid" id="grid" style="display:none;"></div>
  </main>

  <script>
    const grid = document.getElementById("grid");
    const skeletons = document.getElementById("skeletons");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusText = document.getElementById("statusText");
    const sortSelect = document.getElementById("sortSelect");
    let airportsData = [];

    refreshBtn.addEventListener("click", load);
    sortSelect.addEventListener("change", renderSorted);

    async function load() {
      refreshBtn.disabled = true;
      statusText.textContent = "Refreshing…";
      skeletons.style.display = "grid";
      grid.style.display = "none";

      try {
        const res = await fetch("/api/airports", { cache: "no-store" });
        if (!res.ok) { statusText.textContent = "API not set up yet."; skeletons.style.display = "none"; return; }
        const data = await res.json();
        if (!data.ok) { statusText.textContent = "Failed to load."; skeletons.style.display = "none"; return; }

        skeletons.style.display = "none";
        grid.style.display = "grid";
        statusText.textContent = `${data.total} destinations`;
        airportsData = Array.isArray(data.airports) ? data.airports : [];
        renderSorted();
      } catch {
        statusText.textContent = "Connection error.";
        skeletons.style.display = "none";
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function renderSorted() {
      const sorted = [...airportsData];
      const mode = sortSelect.value;

      if (mode === "price-asc") {
        sorted.sort((a, b) => numericPrice(a) - numericPrice(b));
      } else if (mode === "price-desc") {
        sorted.sort((a, b) => numericPrice(b) - numericPrice(a));
      } else if (mode === "city-desc") {
        sorted.sort((a, b) => String(b.city_name ?? "").localeCompare(String(a.city_name ?? ""), undefined, { sensitivity: "base" }));
      } else {
        sorted.sort((a, b) => String(a.city_name ?? "").localeCompare(String(b.city_name ?? ""), undefined, { sensitivity: "base" }));
      }

      render(sorted);
    }

    function render(airports) {
      grid.innerHTML = "";
      airports.forEach((a, i) => {
        const price   = a.cheapest?.price ?? null;
        const cur     = a.cheapest?.currency ?? "EUR";
        const updated = a.cheapest?.updated_at ?? null;
        const nights  = a.number_of_nights ?? null;

        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${i * 40}ms`;

        card.innerHTML = `
          <div class="card-top">
            <div>
              <div class="city-name">${esc(a.city_name)}</div>
              <div class="country">${esc(a.country)}</div>
            </div>
            <span class="iata">${esc(a.iata_city_code)}</span>
          </div>

          <div class="divider"></div>

          <div class="price-row">
            ${price != null
              ? `<span class="price">${esc(formatPrice(price))}</span><span class="currency">${esc(cur)}</span>`
              : `<span class="price no-price">No price yet</span>`}
          </div>

          <div class="meta">
            ${updated ? `<span class="meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${esc(formatUpdated(updated))}
            </span>` : ""}
            ${nights != null ? `<span class="meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              ${esc(nights)} nights
            </span>` : ""}
          </div>

          <div class="card-footer">
            <button class="btn-send" data-code="${esc(a.iata_city_code)}">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send request
            </button>
            <span class="feedback" id="fb_${esc(a.iata_city_code)}"></span>
          </div>
        `;

        card.querySelector(".btn-send").addEventListener("click", (e) => {
          sendRequest(a.iata_city_code, e.currentTarget);
        });

        grid.appendChild(card);
      });
    }

    async function sendRequest(code, btn) {
      const fb = document.getElementById("fb_" + code);
      btn.disabled = true;
      fb.className = "feedback";

      try {
        const res = await fetch("/api/request", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ file_ref: `${code}.json` })
        });

        const data = res.ok ? await res.json() : null;

        if (!res.ok || !data?.ok) {
          fb.textContent = data?.error || "Failed";
          fb.className = "feedback err";
          btn.disabled = false;
          return;
        }

        fb.textContent = "Queued ✓";
        fb.className = "feedback ok";
        setTimeout(() => { fb.className = "feedback"; btn.disabled = false; }, 4000);
      } catch {
        fb.textContent = "Error";
        fb.className = "feedback err";
        btn.disabled = false;
      }
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function numericPrice(airport) {
      const p = airport?.cheapest?.price;
      return typeof p === "number" ? p : Number.MAX_SAFE_INTEGER;
    }

    function formatPrice(value) {
      return new Intl.NumberFormat(undefined, { maximumFractionDigits: 0 }).format(value);
    }

    function formatUpdated(value) {
      const d = new Date(value);
      return Number.isNaN(d.getTime())
        ? value
        : d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }

    load();
  </script>
</body>
</html>
