<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flight Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --surface2: #141b28;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #00d4ff;
      --accent2: #7b61ff;
      --text: #f0f4ff;
      --text-muted: #5a6a80;
      --text-dim: #8899aa;
      --ok: #00e5a0;
      --err: #ff4d6a;
      --warn: #ffb020;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(123,97,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.8);
      backdrop-filter: blur(12px);
      flex-wrap: wrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 200px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 999px;
      min-width: 120px;
      transition: all 0.3s;
    }

    .status-pill.loading { color: var(--warn); border-color: rgba(255,176,32,0.2); }
    .status-pill.loaded  { color: var(--ok);   border-color: rgba(0,229,160,0.2); }
    .status-pill.error   { color: var(--err);  border-color: rgba(255,77,106,0.2); }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .status-pill.loading .status-dot { animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .btn-primary {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      border: none;
      padding: 9px 18px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .link-subtle {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .link-subtle:hover { color: var(--accent); border-color: var(--accent); }

    /* Main content */
    .main {
      position: relative;
      z-index: 1;
      padding: 28px 32px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .stat-item {
      flex: 1;
      background: var(--surface);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.4s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,255,0.05);
    }

    /* Subtle card glow on hover */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:hover::before { opacity: 0.6; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .city {
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .code-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.15);
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 1px;
    }

    .country-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 5px;
      margin-top: 4px;
      display: inline-block;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .price-section {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }

    .price {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
      line-height: 1;
    }

    .price.has-price { color: var(--accent); }

    .currency {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .meta-row {
      display: flex;
      gap: 14px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .meta-item {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-item svg { opacity: 0.5; flex-shrink: 0; }

    .card-footer {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-send {
      cursor: pointer;
      background: var(--surface2);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.5px;
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .btn-send:hover {
      background: rgba(0,212,255,0.1);
      border-color: rgba(0,212,255,0.3);
      color: var(--accent);
    }

    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .msg-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .msg-tag.visible { opacity: 1; }
    .msg-tag.ok  { background: rgba(0,229,160,0.1); color: var(--ok); border: 1px solid rgba(0,229,160,0.2); }
    .msg-tag.err { background: rgba(255,77,106,0.1); color: var(--err); border: 1px solid rgba(255,77,106,0.2); }

    /* Empty / loading state */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      height: 180px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header { padding: 18px 16px; }
      .main { padding: 18px 16px; }
      .stats-bar { display: none; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo-icon">✈</div>
      <h1>Flight<span>Dash</span></h1>
    </div>
    <div class="header-right">
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">Connecting…</span>
      </div>
      <button class="btn-primary" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Refresh
      </button>
      <a class="link-subtle" href="/output.html">Output →</a>
    </div>
  </header>

  <main class="main">
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat-item">
        <div class="stat-label">Destinations</div>
        <div class="stat-value accent" id="statTotal">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Lowest Price</div>
        <div class="stat-value" id="statMin">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Avg. Price</div>
        <div class="stat-value" id="statAvg">—</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">With Prices</div>
        <div class="stat-value" id="statPriced">—</div>
      </div>
    </div>

    <div id="skeletons" class="skeleton-grid">
      ${Array(6).fill('<div class="skeleton-card"></div>').join('')}
    </div>

    <div class="grid" id="grid"></div>
  </main>

  <script>
    const grid = document.getElementById("grid");
    const skeletons = document.getElementById("skeletons");
    const statsBar = document.getElementById("statsBar");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusPill = document.getElementById("statusPill");
    const statusText = document.getElementById("statusText");

    function setStatus(msg, type = "") {
      statusText.textContent = msg;
      statusPill.className = "status-pill" + (type ? " " + type : "");
    }

    refreshBtn.addEventListener("click", () => load());

    function money(v, cur = "EUR") {
      if (v == null) return null;
      return { amount: v, currency: cur };
    }

    async function load() {
      setStatus("Loading…", "loading");
      refreshBtn.disabled = true;
      skeletons.style.display = "grid";
      grid.innerHTML = "";
      statsBar.style.display = "none";

      try {
        const res = await fetch("/api/airports", { cache: "no-store" });
        if (!res.ok) {
          setStatus("API not ready", "error");
          skeletons.style.display = "none";
          return;
        }
        const data = await res.json();
        if (!data.ok) {
          setStatus("Error loading airports", "error");
          skeletons.style.display = "none";
          return;
        }

        skeletons.style.display = "none";
        setStatus(`${data.total} destinations`, "loaded");
        renderStats(data.airports);
        render(data.airports);
      } catch (e) {
        setStatus("Connection failed", "error");
        skeletons.style.display = "none";
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function renderStats(airports) {
      const prices = airports.map(a => a.cheapest?.price).filter(p => p != null);
      if (prices.length === 0) return;
      const min = Math.min(...prices);
      const avg = Math.round(prices.reduce((a, b) => a + b, 0) / prices.length);
      const cur = airports[0]?.cheapest?.currency || "EUR";

      document.getElementById("statTotal").textContent = airports.length;
      document.getElementById("statMin").textContent = `${min} ${cur}`;
      document.getElementById("statAvg").textContent = `${avg} ${cur}`;
      document.getElementById("statPriced").textContent = `${prices.length} / ${airports.length}`;
      statsBar.style.display = "flex";
    }

    function render(airports) {
      grid.innerHTML = "";
      airports.forEach((a, i) => {
        const price = a.cheapest?.price ?? null;
        const cur = a.cheapest?.currency ?? "EUR";
        const updated = a.cheapest?.updated_at ?? null;
        const nights = a.number_of_nights ?? null;

        const card = document.createElement("div");
        card.className = "card";
        card.style.animationDelay = `${i * 50}ms`;

        const priceHTML = price != null
          ? `<span class="price has-price">${price}</span><span class="currency">${cur}</span>`
          : `<span class="price" style="color:var(--text-muted);font-size:22px">No price</span>`;

        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="city">${escapeHtml(a.city_name)}</div>
              <span class="country-pill">${escapeHtml(a.country)}</span>
            </div>
            <div class="code-badge">${escapeHtml(a.iata_city_code)}</div>
          </div>

          <div class="divider"></div>

          <div class="price-section">${priceHTML}</div>

          <div class="meta-row">
            ${updated ? `
            <div class="meta-item">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${escapeHtml(updated)}
            </div>` : ''}
            ${nights != null ? `
            <div class="meta-item">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              ${escapeHtml(nights)}n
            </div>` : ''}
          </div>

          <div class="card-footer">
            <button class="btn-send" data-to="${escapeAttr(a.iata_city_code)}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Request
            </button>
            <span class="msg-tag" id="msg_${escapeAttr(a.iata_city_code)}"></span>
          </div>
        `;

        const btn = card.querySelector(".btn-send");
        btn.addEventListener("click", async () => {
          await sendRequest(a.iata_city_code, btn);
        });

        grid.appendChild(card);
      });
    }

    async function sendRequest(to_code, btn) {
      const msg = document.getElementById("msg_" + to_code);
      btn.disabled = true;
      msg.textContent = "Sending…";
      msg.className = "msg-tag visible";

      const file_ref = `${to_code}.json`;
      try {
        const res = await fetch("/api/request", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ file_ref })
        });

        if (!res.ok) {
          msg.textContent = "API not ready";
          msg.className = "msg-tag visible err";
          btn.disabled = false;
          return;
        }

        const data = await res.json();
        if (!data.ok) {
          msg.textContent = data.error || "Failed";
          msg.className = "msg-tag visible err";
          btn.disabled = false;
          return;
        }

        msg.textContent = "Queued ✓";
        msg.className = "msg-tag visible ok";
        setTimeout(() => { msg.className = "msg-tag"; btn.disabled = false; }, 4000);
      } catch (e) {
        msg.textContent = "Error";
        msg.className = "msg-tag visible err";
        btn.disabled = false;
      }
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) { return escapeHtml(s).replace(/"/g, "&quot;"); }

    load();
  </script>
</body>
</html>
